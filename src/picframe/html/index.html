<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Picframe Control</title>
</head>
<body onload="setStyle(); createSpans(); refreshData(); repeatRefresh();">
    <script type="text/javascript">
        const TYPES = {"bool":[5], "text":[18], "date":[12], "number":[8], "action":[5]};
        const ids = {
            "back": {type:"action", fn:"back={}", val:false, desc:"Previous"},
            "next": {type:"action", fn:"next={}", val:false, desc:"Next"},
            "paused": {type:"bool", fn:"setter", val:false, desc:"Paused"},
            "display_is_on": {type:"bool", fn:"setter", val:false, desc:"Display"},
            "shuffle": {type:"bool", fn:"setter", val:false, desc:"Shuffle"},
            "text_name": {type:"bool", fn:"set_show_text={\"txt_key\":\"name\",\"val\":$val}", val:false, desc:"Name Overlay"},
            "text_date": {type:"bool", fn:"set_show_text={\"txt_key\":\"date\",\"val\":$val}", val:false, desc:"Date Overlay"},
            "text_folder": {type:"bool", fn:"set_show_text={\"txt_key\":\"folder\",\"val\":$val}", val:false, desc:"Folder Overlay"},
            "text_location": {type:"bool", fn:"set_show_text={\"txt_key\":\"location\",\"val\":$val}", val:false, desc:"Location Overlay"},
            "clear_text": {type:"action", fn:"set_show_text={}", val:false, desc:"Clear Text"},
            "refresh_show_text": {type:"action", fn:"refresh_show_text={}", val:false, desc:"Show Text Now"},
            "date_from": {type:"date", fn:"setter", val:0, desc:"Date From"},
            "date_to": {type:"date", fn:"setter", val:0, desc:"Date To"},
            "fade_time": {type:"number", fn:"setter", val:0, desc:"Fade Time"},
            "time_delay": {type:"number", fn:"setter", val:0, desc:"Time Delay"},
            "brightness": {type:"number", fn:"setter", val:0, desc:"Brightness"},
            "subdirectory": {type:"text", fn:"setter", val:"", desc:"Subdirectory"},
            "location_filter": {type:"text", fn:"setter", val:"", desc:"Location Filter"},
            "tags_filter": {type:"text", fn:"setter", val:"", desc:"Tags Filter"},
            "delete": {type:"action", fn:"delete={}", val:false, desc:"Delete Current"},
            "purge_files": {type:"action", fn:"purge_files={}", val:false, desc:"Purge Missing"},
            "stop": {type:"action", fn:"stop={}", val:false, desc:"Stop Service"}
        };
    </script>
    <script type="text/javascript" src="pf_functions.js"></script>

    <main class="container">
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                    <span>Picframe</span>
                </div>
                <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">
                    <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
            </div>
            <p class="tagline">Digital picture frame control panel</p>
        </header>

        <section class="preview">
            <div class="section-header">
                <h2>Live Preview</h2>
                <div class="preview-links">
                    <a href="/current_image" target="_blank" rel="noopener">Full Size</a>
                    <a href="/current_image_original" target="_blank" rel="noopener">Original</a>
                </div>
            </div>
            <div class="preview-frame">
                <img id="preview_img" src="/current_image" alt="Current slideshow frame" loading="eager" />
            </div>
        </section>

        <section class="controls">
            <div class="section-header">
                <h2>Controls</h2>
                <button id="upload_button" onclick="uploadValues()">Apply</button>
            </div>
            <div id="spans" class="controls-grid"></div>
        </section>

        <section class="info">
            <div class="section-header">
                <h2>Status</h2>
            </div>
            <div class="status-grid">
                <div class="status-item">
                    <span class="status-label">Files</span>
                    <span class="status-value" id="status-files">--</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Loading</span>
                    <span class="status-value" id="status-loading">--</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Scan</span>
                    <span class="status-value" id="status-scan">--</span>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
