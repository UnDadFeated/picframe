viewer:
  blur_amount: 12                         # default=12, larger values increase processing load
  blur_zoom: 1.0                          # default=1.0, must be >= 1.0, expands background to fill space
  blur_edges: False                       # default=False, use blurred version of image to fill edges (overrides fit=False)
  edge_alpha: 0.5                         # default=0.5, background color at edge. 1.0 would show reflection of image
  fps: 20.0                               # default=20.0
  background: [0.2, 0.2, 0.3, 1.0]        # default=[0.2, 0.2, 0.3, 1.0], RGBA to fill edges when fitting
  blend_type: "blend"                     # default="blend", choices={"blend", "burn", "bump"}, shader blend type
  font_file: "~/picframe_data/data/fonts/NotoSans-Regular.ttf"
  shader: "~/picframe_data/data/shaders/blend_new"
  show_text_fm: "%b %d, %Y"               # format to show date over the image
  show_text_tm: 20.0                      # default=20.0, time in seconds to show filename/info overlay
  show_text_sz: 13                        # text character size for photo info overlay
  show_text: "name"                       # show text, combine: title, caption, name, date, location, folder, camera, lens, iso, aperture, exposure, white_balance, flash, metering, software, artist, copyright
  text_justify: "L"                       # text justification L, C or R
  text_x_margin: 150                      # pixels from left (use to clear matte border)
  text_y_margin: 20                       # pixels from top/bottom
  text_x_position: null                   # absolute X position in pixels (overrides margin)
  text_y_position: null                   # absolute Y position in pixels (overrides margin)
  text_position_mode: "margin"            # default="margin", options: "margin" or "absolute"
  text_width: null                        # max width for text wrapping in pixels (null = no limit)
  text_line_spacing: 1.2                  # line spacing multiplier for multi-line text
  video_volume: 0                         # video volume 0-100 (0 to mute)
  slide_progress_show: True               # show slide countdown text
  slide_progress_font_size: 11            # slide countdown text size
  slide_progress_position: "top-right"    # countdown position: top-right or bottom-right
  slide_progress_x_offset: 70             # slide countdown text horizontal offset
  slide_progress_y_offset: 50             # slide countdown text vertical offset
  show_cache_indicator: True              # show cache building indicator on startup
  cache_progress_position: "bottom-right"  # position: top-right or bottom-right
  cache_progress_x_offset: 60             # pixels inward from right screen edge
  cache_progress_y_offset: 50             # pixels up from bottom screen edge (was 35 in some versions)
  cache_progress_font_size: 11            # cache progress text font size
  cache_progress_text_width: 500          # cache progress filename text max width
  log_level: "INFO"                       # logging level: DEBUG, INFO, WARNING, ERROR, CRITICAL
  log_max_days: 10                        # maximum days to keep log files
  date_range_days: 15                     # show/cache files within +/- N days of today (year-agnostic)
  enable_date_filter: True                # enable date-based filtering
  enable_smart_cache: True                # only cache files with YYYY-MM-DD_ prefix in date window
  cache_refresh_timezone: "America/Los_Angeles" # timezone for midnight window refresh
  cache_start_min_files: 0                # 0 = wait for full cache build, >0 starts at threshold
  text_bkg_hgt: 0.0                       # default=0.25 (0.0-1.0), percentage of screen height for text background texture
  text_opacity: 0.5                       # default=1.0 (0.0-1.0), alpha value of text overlay
  fit: False                              # default=False, True => scale to fit (gaps), False => crop to fill
  video_fit_display: False                # default=False, True => scale video to display size (may distort)
  kenburns: False                         # default=False, sets fit->False and blur_edges->False
  display_x: 0                            # offset from left of screen
  display_y: 0                            # offset from top of screen
  display_w: null                         # width of display surface (null = use max)
  display_h: null                         # height of display surface
  display_power: 2                        # 0=vcgencmd, 1=xset, 2=wlr-randr (Wayland)
  use_glx: False                          # default=False. Set True for Linux with X server
  use_sdl2: True                          # default=True. Recommended for Wayland/Pi

  mat_images: 0.01                        # default=0.01, auto-mat images with aspect ratio diff > value
  mat_type: null                          # mat styles: float, float_polaroid, single_bevel, double_bevel, etc.
  outer_mat_color: null                   # RGBA list for outer mat color (null = auto)
  inner_mat_color: null                   # RGBA list for inner mat color (null = auto)
  outer_mat_border: 75                    # minimum outer mat border in pixels
  inner_mat_border: 40                    # minimum inner mat border in pixels
  outer_mat_use_texture: True             # use texture for outer mat
  inner_mat_use_texture: False            # use texture for inner mat
  mat_resource_folder: "~/picframe_data/data/mat" # folder containing mat image files

  show_clock: False                       # show clock overlay
  clock_justify: "R"                      # clock justification L, C, or R
  clock_text_sz: 120                      # clock font size
  clock_format: "%-I:%M"                  # strftime format for clock
  clock_opacity: 1.0                      # clock opacity (0.0 to 1.0)
  clock_top_bottom: "T"                   # T for top, B for bottom
  clock_wdt_offset_pct: 3.0               # horizontal margin %
  clock_hgt_offset_pct: 3.0               # vertical margin %

  menu_text_sz: 40                        # menu character size
  menu_autohide_tm: 10.0                  # auto-hide menu after seconds (0 = never)
  geo_suppress_list: []                   # substrings to remove from location text

model:
  pic_dir: "~/Pictures"                   # root folder for images
  deleted_pictures: "~/DeletedPictures"   # move deleted pictures here
  no_files_img: "~/picframe_data/data/no_pictures.jpg" # image to show if none selected
  follow_links: False                     # follow symbolic links to directories
  subdirectory: ""                        # subdir of pic_dir to display
  recent_n: 7                             # prefer files modified in last N days
  reshuffle_num: 1                        # play count before reshuffling
  time_delay: 200.0                       # seconds between slides
  fade_time: 10.0                         # crossfade duration
  update_interval: 2.0                    # seconds between scans for new files
  shuffle: True                           # shuffle on reload
  sort_cols: 'fname ASC'                  # default sort order (fname, exif_datetime, etc.)
  image_attr: [                           # EXIF/metadata fields for MQTT/info
    "PICFRAME GPS",
    "PICFRAME LOCATION",
    "EXIF FNumber",
    "EXIF ExposureTime",
    "EXIF ISOSpeedRatings",
    "EXIF FocalLength",
    "EXIF DateTimeOriginal",
    "Image Model",
    "Image Make",
    "IPTC Caption/Abstract",
    "IPTC Object Name",
    "IPTC Keywords"]
  load_geoloc: False                      # fetch location from OpenStreetMap (requires geo_key)
  geo_key: "your_email@example.com"       # unique key for geocoder (use your email)
  locale: "en_GB.UTF-8"                    # system locale for date/time
  key_list: [
    ["tourism","amenity","isolated_dwelling"],
    ["suburb","village"],
    ["city","county"],
    ["region","state","province"],
    ["country"]]
  db_file: "~/picframe_data/data/pictureframe.db3" # SQLite database file
  bad_files_db: "~/picframe_data/data/bad_files.db3" # database for unreadable files
  portrait_pairs: False                   # show portrait images side-by-side
  location_filter: ""                     # SQL filter for location
  tags_filter: ""                         # SQL filter for tags
  log_level: "WARNING"                    # log level for model
  log_file: ""                            # path to file for continuous logging

mqtt:
  use_mqtt: False                         # enable MQTT control
  server: "your_mqtt_broker"              # hostname of broker
  port: 8883                              # 8883 for TLS, 1883 otherwise
  login: ""                               # mqtt username
  password: ""                            # mqtt password
  tls: ""                                 # path to ca.crt (empty = no TLS)
  device_id: "picframe"                   # unique device ID
  device_url: ""                          # URL for Home Assistant state link

http:
  use_http: True                          # enable web interface
  path: "~/picframe_data/html"            # folder for HTML files
  port: 9000                              # HTTP port (must be > 1024)
  auth: false                             # enable basic auth
  username: admin                         # auth username
  password: null                          # auth password (null = random)
  use_ssl: False                          # enable HTTPS
  keyfile: "path/to/key.pem"              # private-key
  certfile: "path/to/cert.pem"            # certificate

peripherals:
  input_type: null                        # input device: {null, "keyboard", "touch", "mouse"}
  buttons:
    pause:
      enable: True
      label: "Pause"
      shortcut: " "
    display_off:
      enable: True
      label: "Display off"
      shortcut: "o"
    location:
      enable: False
      label: "Location"
      shortcut: "l"
    exit:
      enable: False
      label: "Exit"
      shortcut: "e"
    power_down:
      enable: False
      label: "Power down"
      shortcut: "p"

ai:
  semantic_tagging_enable: False
  face_aware_kenburns: False
ambient:
  pir_sensor_pin: 0
  true_tone_adjust: "none"
dashboard:
  weather_overlay_enable: False
  weather_location: ""
  daily_recap_mode: False
cloud:
  rclone_sync_enable: False
  rclone_remote_name: "google_drive:"
  rclone_sync_interval: 24
sound:
  soundscapes_enable: False
  sound_profile: "none"
