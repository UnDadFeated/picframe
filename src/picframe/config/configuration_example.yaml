viewer:
  blur_amount: 12
  blur_zoom: 1.0
  blur_edges: False
  edge_alpha: 0.5
  fps: 20.0
  background: [0.2, 0.2, 0.3, 1.0]
  blend_type: "blend"
  font_file: "~/picframe_data/data/fonts/NotoSans-Regular.ttf"
  shader: "~/picframe_data/data/shaders/blend_new"
  show_text_fm: "%b %d, %Y"
  show_text_tm: 180.0
  show_text_sz: 13
  show_text: "name"
  text_justify: "L"
  text_x_margin: 150
  text_y_margin: 20
  text_x_position: null
  text_y_position: null
  text_position_mode: "margin"
  text_width: null
  text_line_spacing: 1.2
  video_volume: 0
  slide_progress_show: True
  slide_progress_font_size: 11
  slide_progress_position: "top-right"
  slide_progress_x_offset: 70
  slide_progress_y_offset: 50
  show_cache_indicator: True
  cache_progress_position: "bottom-right"
  cache_progress_x_offset: 80
  cache_progress_y_offset: 35
  cache_progress_font_size: 11
  cache_progress_text_width: 500
  log_level: "INFO"
  log_max_days: 10
  date_range_days: 15
  enable_date_filter: True
  enable_smart_cache: True
  cache_refresh_timezone: "America/Los_Angeles"
  cache_start_min_files: 0
  text_bkg_hgt: 0.0
  text_opacity: 0.5
  fit: False
  video_fit_display: True
  kenburns: False
  display_x: 0
  display_y: 0
  display_w: null
  display_h: null
  display_power: 2
  use_glx: False
  use_sdl2: True

  mat_images: 0.01
  mat_type: null
  outer_mat_color: null
  inner_mat_color: null
  outer_mat_border: 75
  inner_mat_border: 40
  outer_mat_use_texture: True
  inner_mat_use_texture: False
  mat_resource_folder: "~/picframe_data/data/mat"

  show_clock: False
  clock_justify: "R"
  clock_text_sz: 120
  clock_format: "%-I:%M"
  clock_opacity: 1.0
  clock_top_bottom: "T"
  clock_wdt_offset_pct: 3.0
  clock_hgt_offset_pct: 3.0

  menu_text_sz: 40
  menu_autohide_tm: 10.0
  geo_suppress_list: []

model:
  pic_dir: "~/Pictures"
  deleted_pictures: "~/DeletedPictures"
  follow_links: False
  no_files_img: "~/picframe_data/data/no_pictures.jpg"
  subdirectory: ""
  recent_n: 7
  reshuffle_num: 1
  time_delay: 200.0
  fade_time: 10.0
  update_interval: 2.0
  shuffle: True
  sort_cols: 'fname ASC'
  image_attr: [
    "PICFRAME GPS",
    "PICFRAME LOCATION",
    "EXIF FNumber",
    "EXIF ExposureTime",
    "EXIF ISOSpeedRatings",
    "EXIF FocalLength",
    "EXIF DateTimeOriginal",
    "Image Model",
    "Image Make",
    "IPTC Caption/Abstract",
    "IPTC Object Name",
    "IPTC Keywords"]
  load_geoloc: False
  geo_key: "your_email@example.com"
  locale: "en_GB.UTF-8"
  key_list: [
    ["tourism","amenity","isolated_dwelling"],
    ["suburb","village"],
    ["city","county"],
    ["region","state","province"],
    ["country"]]
  db_file: "~/picframe_data/data/pictureframe.db3"
  bad_files_db: "~/picframe_data/data/bad_files.db3"
  portrait_pairs: False
  location_filter: ""
  tags_filter: ""
  log_level: "WARNING"
  log_file: ""

mqtt:
  use_mqtt: False
  server: "your_mqtt_broker"
  port: 8883
  login: ""
  password: ""
  tls: ""
  device_id: "picframe"
  device_url: ""

http:
  use_http: True
  path: "~/picframe_data/html"
  port: 9000
  auth: false
  username: admin
  password: null
  use_ssl: False
  keyfile: "path/to/key.pem"
  certfile: "path/to/cert.pem"

peripherals:
  input_type: null
  buttons:
    pause:
      enable: True
      label: "Pause"
      shortcut: " "
    display_off:
      enable: True
      label: "Display off"
      shortcut: "o"
    location:
      enable: False
      label: "Location"
      shortcut: "l"
    exit:
      enable: False
      label: "Exit"
      shortcut: "e"
    power_down:
      enable: False
      label: "Power down"
      shortcut: "p"