viewer:
  blur_amount: 12                           # blur radius for background (larger = more CPU load)
  blur_zoom: 1.0                            # background zoom factor (must be >= 1.0)
  blur_edges: False                          # use blurred image to fill edges (overrides fit=False)
  edge_alpha: 0.5                            # alpha at image edge (1.0 = reflection)
  fps: 20.0                                  # frames per second
  background: [0.2, 0.2, 0.3, 1.0]          # RGBA background color
  blend_type: "blend"                        # blend shader type: blend, burn, or bump
  font_file: "~/picframe_data/data/fonts/NotoSans-Regular.ttf"
  shader: "~/picframe_data/data/shaders/blend_new"
  show_text_fm: "%b %d, %Y"                  # date format for overlay text
  show_text_tm: 180.0                        # seconds to show filename overlay
  show_text_sz: 13                           # font size for photo info overlay
  show_text: "name"                          # what to show: name, date, folder, location, etc.
  text_justify: "L"                          # text justification: L, C, or R
  text_x_margin: 150                         # left margin for overlay text
  text_y_margin: 20                          # top/bottom margin for overlay text
  text_x_position: null                      # absolute X position (overrides margin when set)
  text_y_position: null                      # absolute Y position (overrides margin when set)
  text_position_mode: "margin"               # use "margin" or "absolute" positions
  text_width: null                           # max pixel width for text wrapping
  text_line_spacing: 1.2                     # line spacing multiplier for multi-line text
  video_volume: 0                            # video volume 0-100 (set 0 to mute)
  slide_progress_show: True                  # show slide countdown text
  slide_progress_font_size: 11               # slide countdown font size
  slide_progress_position: "top-right"       # countdown position: top-right or bottom-right
  slide_progress_x_offset: 70                # countdown horizontal offset (pixels from edge)
  slide_progress_y_offset: 50                # countdown vertical offset (pixels from edge)
  show_cache_indicator: True                  # show cache-building progress on startup
  cache_progress_position: "bottom-right"    # cache text position: top-right or bottom-right
  cache_progress_x_offset: 80                # cache text horizontal offset (pixels from right edge)
  cache_progress_y_offset: 35                # cache text vertical offset (pixels from bottom edge)
  cache_progress_font_size: 11              # cache text font size
  cache_progress_text_width: 500             # max pixel width for cache filename portion
  log_level: "INFO"                          # logging: DEBUG, INFO, WARNING, ERROR, CRITICAL
  log_max_days: 10                            # days to keep log files
  date_range_days: 15                         # smart cache window: +/- days from today (year-agnostic)
  enable_date_filter: True                    # enable date-based filtering (shows files in date window)
  enable_smart_cache: True                   # only cache files with YYYY-MM-DD_ prefix in date window
  cache_refresh_timezone: "America/Los_Angeles"  # timezone for midnight date-window refresh
  cache_start_min_files: 0                    # min files before starting (0 = wait for full cache)
  text_bkg_hgt: 0.0                          # text background height (0.0 to 1.0 = screen fraction)
  text_opacity: 0.5                          # text overlay opacity (0.0 to 1.0)
  fit: False                                  # True = scale to fit (gaps), False = crop to fill
  video_fit_display: True                    # True = stretch to display, False = maintain aspect
  kenburns: False                            # enable kenburns zoom effect (sets fit=False, blur_edges=False)
  display_x: 0                               # X offset from screen left (can be negative)
  display_y: 0                               # Y offset from screen top (can be negative)
  display_w: null                            # display width (null = use hardware max)
  display_h: null                            # display height (null = use hardware max)
  display_power: 2                           # display off method: 0=vcgencmd, 1=xset, 2=wlr-randr
  use_glx: False                             # True for Linux with X server (may need use_sdl2=False)
  use_sdl2: True                             # True uses SDL2 without X server (recommended)

  # Matting (photo frame border)
  mat_images: 0.01                           # auto-mat threshold: False=off, True=all, 0.01+=aspect diff
  mat_type: null                             # mat styles: float, float_polaroid, single_bevel, double_bevel, etc.
  outer_mat_color: null                       # RGB list for outer mat color
  inner_mat_color: null                       # RGB list for inner mat color
  outer_mat_border: 75                        # outer mat border size (pixels)
  inner_mat_border: 40                        # inner mat border size (pixels)
  outer_mat_use_texture: True                # use texture for outer mat (False = solid color)
  inner_mat_use_texture: False               # use texture for inner mat
  mat_resource_folder: "~/picframe_data/data/mat"  # folder containing mat image files

  # Clock overlay
  show_clock: False                          # show clock overlay
  clock_justify: "R"                         # clock justification: L, C, or R
  clock_text_sz: 120                         # clock font size
  clock_format: "%-I:%M"                    # clock strftime format
  clock_opacity: 1.0                        # clock opacity (0.0 to 1.0)
  clock_top_bottom: "T"                      # T = top, B = bottom
  clock_wdt_offset_pct: 3.0                 # horizontal margin (% of screen width)
  clock_hgt_offset_pct: 3.0                  # vertical margin (% of screen height)
                                              # text in /dev/shm/clock.txt displays below time

  # Menu / Controls
  menu_text_sz: 40                          # menu font size
  menu_autohide_tm: 10.0                     # auto-hide menu after seconds (0 = never)
  geo_suppress_list: []                       # substrings to remove from location text

model:
  pic_dir: "~/Pictures"                      # root folder for photos/videos (supports NAS mount)
  deleted_pictures: "~/DeletedPictures"     # folder for deleted files
  follow_links: False                       # follow symbolic links to directories
  no_files_img: "~/picframe_data/data/no_pictures.jpg"  # image when no files found
  subdirectory: ""                           # subfolder of pic_dir to display
  recent_n: 7                                # shuffle priority: prefer files from last N days
  reshuffle_num: 1                           # times through before reshuffling
  time_delay: 200.0                          # seconds between slide changes
  fade_time: 10.0                            # seconds for crossfade transition
  update_interval: 2.0                       # seconds between folder scans for new files
  shuffle: True                             # shuffle image order
  sort_cols: 'fname ASC'                    # sort columns (fname, exif_datetime, last_modified, etc.)
  image_attr: [                             # EXIF fields to send via MQTT
    "PICFRAME GPS",                         # special: GPS coordinates
    "PICFRAME LOCATION",                    # special: reverse geocode location
    "EXIF FNumber",
    "EXIF ExposureTime",
    "EXIF ISOSpeedRatings",
    "EXIF FocalLength",
    "EXIF DateTimeOriginal",
    "Image Model",
    "Image Make",
    "IPTC Caption/Abstract",
    "IPTC Object Name",
    "IPTC Keywords"]
  load_geoloc: False                        # fetch location from OpenStreetMap (requires geo_key)
  geo_key: "your_email@example.com"         # unique key for geolocation service (your email)
  locale: "en_GB.UTF-8"                     # system locale for date/time formatting
  key_list: [                               # location hierarchy for reverse geocoding
    ["tourism","amenity","isolated_dwelling"],
    ["suburb","village"],
    ["city","county"],
    ["region","state","province"],
    ["country"]]
  db_file: "~/picframe_data/data/pictureframe.db3"  # SQLite database for cached file info
  bad_files_db: "~/picframe_data/data/bad_files.db3"  # database for corrupt/unreadable files
  portrait_pairs: False                     # pair portrait images side-by-side
  location_filter: ""                       # SQL WHERE clause for location filtering
  tags_filter: ""                           # SQL WHERE clause for tags filtering
  log_level: "WARNING"                      # logging level for model
  log_file: ""                              # path to log file (empty = console only)

mqtt:
  use_mqtt: False                           # enable MQTT remote control
  server: "your_mqtt_broker"               # MQTT broker hostname
  port: 8883                               # MQTT port (8883=TLS, 1883=plain)
  login: ""                                # MQTT username
  password: ""                             # MQTT password
  tls: ""                                  # path to CA certificate (empty = no TLS)
  device_id: "picframe"                    # unique device ID (change for multiple frames)
  device_url: ""                           # Home Assistant URL for state updates

http:
  use_http: True                            # enable HTTP web interface
  path: "~/picframe_data/html"             # path to HTML files
  port: 9000                               # HTTP server port (don't use < 1024)
  auth: false                              # enable basic authentication
  username: admin                          # HTTP auth username
  password: null                           # HTTP auth password (null = random, stored in basic_auth.txt)
  use_ssl: False                           # enable HTTPS
  keyfile: "path/to/key.pem"               # SSL private key file
  certfile: "path/to/cert.pem"             # SSL certificate file

peripherals:
  input_type: null                          # input device: null, keyboard, touch, or mouse
  buttons:
    pause:
      enable: True
      label: "Pause"
      shortcut: " "
    display_off:
      enable: True
      label: "Display off"
      shortcut: "o"
    location:
      enable: False
      label: "Location"
      shortcut: "l"
    exit:
      enable: False
      label: "Exit"
      shortcut: "e"
    power_down:
      enable: False
      label: "Power down"
      shortcut: "p"
ai:
  semantic_tagging_enable: False
  face_aware_kenburns: False
ambient:
  pir_sensor_pin: 0
  true_tone_adjust: "none"
dashboard:
  weather_overlay_enable: False
  weather_location: ""
  daily_recap_mode: False
cloud:
  rclone_sync_enable: False
  rclone_remote_name: "google_drive:"
  rclone_sync_interval: 24
sound:
  soundscapes_enable: False
  sound_profile: "none"
